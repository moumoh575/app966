<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro | Live AI Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .message-fade { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl text-white">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-black text-slate-800 leading-tight">Agentoro Platform</h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Live Automation Hub</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-100">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-green-700">SERVER ONLINE: 161.97.177.100</span>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col h-[650px] overflow-hidden">
            
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center text-slate-500 font-bold">IG</div>
                    <div>
                        <p class="text-sm font-bold text-slate-700">Instagram Direct Sync</p>
                        <p class="text-[10px] text-slate-400 font-medium">Monitoring Real-time Conversations</p>
                    </div>
                </div>
                <i class="fas fa-ellipsis-v text-slate-300"></i>
            </div>

            <div id="chat-content" class="flex-1 overflow-y-auto p-8 space-y-6">
                <div class="flex flex-col items-center justify-center h-full text-slate-400 space-y-4">
                    <i class="fas fa-satellite-dish text-4xl animate-bounce"></i>
                    <p class="text-sm italic">Listening for messages from VPS:5000...</p>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t text-center">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">
                    Authorized via Meta Meta App ID: 1435934461170151
                </p>
            </div>
        </div>
    </main>

    <script>
        const VPS_ENDPOINT = "http://161.97.177.100:5000/messages"; // الرابط الذي اتفقنا عليه
        const chatContent = document.getElementById('chat-content');

        async function updateLiveChat() {
            try {
                const response = await fetch(VPS_ENDPOINT);
                const data = await response.json();

                if (data && data.length > 0) {
                    chatContent.innerHTML = ''; // تنظيف الشاشة عند وجود بيانات جديدة
                    
                    data.forEach(msg => {
                        // فقاعة رسالة المستخدم (يسار)
                        const userHtml = `
                            <div class="flex flex-col items-start message-fade">
                                <span class="text-[9px] font-black text-slate-400 ml-3 mb-1 uppercase">Instagram User</span>
                                <div class="bg-slate-100 text-slate-700 px-5 py-3 rounded-2xl rounded-bl-none shadow-sm text-sm font-medium max-w-[80%]">
                                    ${msg.user_text || msg.message}
                                </div>
                            </div>
                        `;

                        // فقاعة رد البوت (يمين)
                        const aiHtml = `
                            <div class="flex flex-col items-end message-fade mt-2">
                                <span class="text-[9px] font-black text-blue-500 mr-3 mb-1 uppercase">Agentoro AI Closer</span>
                                <div class="bg-blue-600 text-white px-5 py-3 rounded-2xl rounded-br-none shadow-md text-sm font-medium max-w-[80%]">
                                    ${msg.ai_response || msg.reply}
                                </div>
                            </div>
                        `;

                        chatContent.innerHTML += userHtml + aiHtml;
                    });

                    // التمرير التلقائي لأسفل
                    chatContent.scrollTop = chatContent.scrollHeight;
                }
            } catch (error) {
                console.error("Waiting for VPS Data...", error);
            }
        }

        // التحديث كل 3 ثوانٍ لرؤية التجربة حية أمام المراجع
        setInterval(updateLiveChat, 3000);
    </script>
</body>
</html>
